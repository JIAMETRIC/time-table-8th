  <style>
    :root {
      --primary: #2596be;
      --secondaryColor: #5bc1da;
      --tertiaryColor: #2596be;

      --fontHeading: 'Playfair Display', serif;
      --fontBody: 'Inter', sans-serif;
      --fontTamil: 'Noto Sans Tamil', sans-serif;
      --card-bg: #ffffff;
      --border: #e2e8f0;
      --header-bg: #f8fafc;
      --text-main: #334155;
      --text-label: #64748b;
    }

    * {
      box-sizing: border-box;
    }

    body {
      font-family: var(--fontBody);
      background: var(--bg);
      padding: 15px;
      margin: 0;
      -webkit-font-smoothing: antialiased;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
    }

    /* --- 1. HEADER STYLES (MATCHING YOUR IMAGE) --- */
    .main-header {
      background: white;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      margin-bottom: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 20px;
      border-left: 6px solid var(--primary);
      /* The blue bar on the left */
      position: relative;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .header-icon {
      font-size: 24px;
    }

    .header-title {
      color: var(--primary);
      font-size: 20px;
      font-weight: 700;
      margin: 0;
    }

    .header-right {
      display: flex;
      flex-direction: column;
      align-items: center;
      line-height: 1.2;
    }

    .booth-label {
      font-size: 12px;
      color: var(--text-label);
      font-weight: 500;
    }

    .booth-value {
      font-size: 15px !important;
      font-weight: 500;
      color: var(--primary);   
    }

    /* --- DESKTOP ORIGINAL DESIGN ELEMENTS --- */
    .advanced-filter-panel {
      background: #f8fafc;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 20px;
    }

    .panel-title {
      font-weight: 700;
      font-size: 16px;
      margin-bottom: 15px;
      color: #334155;
      border-bottom: 1px solid #e2e8f0;
      padding-bottom: 5px;
    }

    .filter-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      align-items: flex-end;
    }

    .filter-group {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .filter-group label {
      font-size: 12px;
      font-weight: 600;
      color: #64748b;
    }

    .stats-bar {
      background: #ffffff;
      border: 1px solid var(--border);
      padding: 12px 20px;
      border-radius: 6px;
      display: flex;
      gap: 30px;
      font-weight: 700;
      color: var(--primary);
      margin-bottom: 15px;
      font-size: 14px;
    }

    .filter-input,
    .filter-select {
      width: 100%;
      padding: 8px;
      border: 1px solid var(--border);
      border-radius: 4px;
      font-size: 12px;
    }

    .btn-search {
      background: var(--primary);
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 4px;
      cursor: pointer;
      font-weight: 600;
    }

    .btn-clear {
      background: #ef4444;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 4px;
      cursor: pointer;
      font-weight: 600;
    }

    /* Desktop Table Styling */
    table.dataTable {
      width: 100%;
      border-collapse: collapse;
      background: white;
      border-radius: 8px;
      overflow: hidden;
    }

    table.dataTable thead th {
      background: var(--primary);
      color: white;
      padding: 12px;
      font-size: 13px;
      text-transform: uppercase;
      text-align: left;
    }

    .filter-row th {
      background: #ebf2f7 !important;
      padding: 8px !important;
    }

    .tamil-text {
      font-family: var(--fontTamil);
    }

    .tamil-name {
      font-family: var(--fontTamil);
    }

    /* --- MOBILE RESPONSIVE STYLES --- */
    @media screen and (max-width: 768px) {

      /* 1. Hide Desktop-Specific Elements */
      .stats-bar,
      .advanced-filter-panel,
      .filter-row,
      thead {
        display: none !important;
      }

      /* 2. Header Adjustments for Mobile */
      .main-header {
        padding: 12px 15px;
        margin-bottom: 15px;
      }

      .header-title {
        font-size: 18px;
      }

      .booth-value {
        font-size: 18px;
      }

      /* 3. Global Search Styling */
      .dataTables_wrapper .dataTables_filter {
        float: none;
        text-align: center;
        margin-bottom: 15px;
      }

      .dataTables_wrapper .dataTables_filter input {
        width: 100%;
        margin-left: 0;
        height: 45px;
        padding: 10px 20px;
        border: 1px solid #cbd5e1;
        border-radius: 25px;
        /* Rounded pill shape */
        font-size: 15px;
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05);
        outline: none;
           }

      .dataTables_wrapper .dataTables_filter input:focus {
        border-color: var(--primary);
      }

      /* 4. Card Layout */
      table.dataTable {
        border: none;
        background: transparent;
      }

      table.dataTable tbody tr {
        display: flex;
        flex-direction: column;
        background: var(--card-bg);
        border: 1px solid var(--border);
        border-radius: 12px;
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        margin-bottom: 15px;
        overflow: hidden;
        padding: 15px;       
      }

      table.dataTable td {
        display: flex;
        justify-content: space-between;
        align-items: center;
        border: none;
        border-bottom: 1px solid #f1f5f9;
        padding: 10px 15px;
        font-size: 14px;
        color: var(--text-main);
        text-align: right;
        border-radius: 1px
      }

      table.dataTable td:last-child {
        border-bottom: none;
      }

      /* 5. Labels (Key) */
      table.dataTable td::before {
        content: attr(data-label);
        font-weight: 600;
        color: var(--text-label);
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        text-align: left;
      }

      /* 6. Card Header Style (The first cell) */
      table.dataTable td[data-label="#"] {
        background-color: var(--header-bg);
        border-bottom: 1px solid #e2e8f0;
        color: var(--secondary);
        font-weight: 800;
        font-size: 15px;
        padding: 12px 15px;
      }

      table.dataTable td[data-label="#"]::before {
        display: none;
      }

      /* 7. Typography Highlights */
      table.dataTable td[data-label="Name (English)"] {
        color: var(--primary);
        font-weight: 700;
        font-size: 15px;
      }

      table.dataTable td[data-label="Name (Tamil)"] {
        font-size: 14px;
        font-weight: 600;
      }

      /* 8. Pagination Responsive */
      .dataTables_wrapper .dataTables_paginate {
        display: flex;
        justify-content: center;
        margin-top: 10px;
      }

      .dataTables_wrapper .dataTables_paginate .paginate_button {
        padding: 5px 10px;
        font-size: 12px;
      }
    }

    /* Utility for Card Header Badge */
    .card-header-badge {
      background: #e2e8f0;
      color: #475569;
      font-size: 11px;
      padding: 3px 8px;
      border-radius: 4px;
      font-weight: 600;
      float: right;
      display: none;
    }

    @media (max-width: 768px) {
      .card-header-badge {
        display: inline-block;
      }
    }
  </style>

    "gen": "Female",
    "bth": "140-Thali-West",
    "pg": "22"
  }
];

let table;

    $(document).ready(function () {
      const tbody = $('#tableData');

      mainData.forEach(r => {
        // Mobile View: We inject the Booth Number into the first cell as a badge for the Card Header
        // Desktop View: This badge is hidden via CSS
        const snoCellContent = `
            <span style="float:left"># ${r.sno}</span>
            <span class="card-header-badge">Booth: ${r.bth}</span>
        `;

        tbody.append(`<tr>
            <td data-label="#" data-order="${r.sno}">${snoCellContent}</td>
            <td data-label="EPIC No">${r.epic}</td>
            <td data-label="Name (Tamil)" class="tamil-text">${r.ta}</td>
            <td data-label="Name (English)">${r.en}</td>
            <td data-label="Relative Name">${r.rnm}</td>
            <td data-label="Age">${r.age}</td>
            <td data-label="Gender">${r.gen}</td>
            <td data-label="Booth">${r.bth}</td>
            <td data-label="Page">${r.pg}</td>
        </tr>`);
      });

      table = $('#voterTable').DataTable({
        orderCellsTop: true,
        // DOM Configuration: 
        // Mobile uses only 'f' (filter), 'r' (processing), 't' (table), 'i' (info), 'p' (pagination)
        // Desktop elements are hidden via CSS so strict DOM placement isn't as critical, but we keep it standard.
        dom: '<"top"f>rt<"bottom"ip><"clear">',
        pageLength: 10, // Default page length
        language: {
          search: "",
          searchPlaceholder: "🔍 Search Name, EPIC..."
        },
        drawCallback: function () {
          const api = this.api();
          updateStats(api);
          updateHeaderBooth(api); // Update the big header booth number
        }
      });

      // 1. Excel Header Search (Desktop)
      $('.excel-filter').on('keyup change', function () {
        const colIdx = $(this).data('col');
        const val = $(this).val();
        if ($(this).hasClass('strict-f')) {
          table.column(colIdx).search(val ? '^' + val + '$' : '', true, false).draw();
        } else {
          table.column(colIdx).search(val).draw();
        }
      });

      // 2. Global Advanced Filter Panel Push (Desktop)
      $.fn.dataTable.ext.search.push(function (settings, data) {
        let min = parseInt($('#advMinAge').val(), 10);
        let max = parseInt($('#advMaxAge').val(), 10);
        let age = parseFloat(data[5]) || 0;
        let gen = $('#advGender').val();
        let bth = $('#advBooth').val();
        let pg = $('#advPage').val();

        if (!isNaN(min) && age < min) return false;
        if (!isNaN(max) && age > max) return false;
        if (gen !== "" && data[6] !== gen) return false;
        if (bth !== "" && data[7] !== bth) return false;
        if (pg !== "" && data[8] !== pg) return false;

        return true;
      });
    });

    function applyAdvancedFilters() { table.draw(); }

    function updateStats(api) {
      // Only update if stats bar is visible (Desktop check is done via CSS usually, 
      // but running calculation doesn't hurt)
      const data = api.rows({ filter: 'applied' }).data();
      let m = 0, f = 0;
      data.each(row => {
        // row[6] is Gender. 
        if (row[6] === 'Male') m++;
        if (row[6] === 'Female') f++;
      });
      $('#totalCount').text(data.length);
      $('#maleCount').text(m);
      $('#femaleCount').text(f);
    }

    // Logic to update the Main Header Booth Number
    function updateHeaderBooth(api) {
      const data = api.rows({ filter: 'applied' }).data();
      if (data.length > 0) {
        // Get the booth number of the first visible row (Index 7 is Booth)
        const firstBooth = data[0][7];
        $('#headerBoothNo').text(firstBooth);
      } else {
        $('#headerBoothNo').text("-");
      }
    }
  </script>
</body>

</html>
